# =============================================================================
# SITE SETTINGS
# =============================================================================

title                    : "Daniel Sills"
title_separator          : "-"
subtitle                 : # tagline shown below site title in masthead
name                     : "Daniel Sills"
description              : "Personal portfolio and blog."

# Leave url blank until a custom domain is purchased.
# When ready: set to "https://yourdomain.com" and update the CNAME file.
url                      : ""
baseurl                  : ""

# Update to your actual GitHub username/repo when known.
repository               : "YOUR-GITHUB-USERNAME/Portfolio"

# =============================================================================
# THEME
# =============================================================================

remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "dark"

# =============================================================================
# AUTHOR
# =============================================================================

author:
  name    : "Daniel Sills"
  avatar  : "/assets/images/profile/avatar.jpg"  # add headshot in Phase 3
  bio     : ""  # short bio — fill in before launch
  location: ""
  email   : ""  # optional — use contact form instead of exposing email
  links:
    - label : "GitHub"
      icon  : "fab fa-fw fa-github"
      url   : "https://github.com/YOUR-GITHUB-USERNAME"
    - label : "LinkedIn"
      icon  : "fab fa-fw fa-linkedin"
      url   : ""  # add LinkedIn URL

# =============================================================================
# READING / DISPLAY
# =============================================================================

locale                   : "en-US"
timezone                 : "America/Chicago"  # adjust to your timezone
words_per_minute         : 200
atom_feed:
  path                   : # blank = default /feed.xml

# =============================================================================
# COLLECTIONS
# =============================================================================

collections:
  projects:
    output    : true
    permalink : /projects/:path/

# =============================================================================
# DEFAULTS
# =============================================================================

defaults:
  # Blog posts
  - scope:
      path : ""
      type : posts
    values:
      layout        : single
      author_profile: true
      read_time     : true
      comments      : false
      share         : false
      related       : true
  # Projects
  - scope:
      path : ""
      type : projects
    values:
      layout        : single
      author_profile: false
  # Pages
  - scope:
      path : ""
      type : pages
    values:
      layout        : single
      author_profile: true

# =============================================================================
# PAGINATION
# =============================================================================

paginate      : 5
paginate_path : /page:num/

# =============================================================================
# PLUGINS
# =============================================================================

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Mirrors plugin list for local --safe builds
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# =============================================================================
# ARCHIVES (liquid-based, no extra gem required)
# =============================================================================

category_archive:
  type : liquid
  path : /categories/
tag_archive:
  type : liquid
  path : /tags/

# =============================================================================
# BUILD
# =============================================================================

markdown    : kramdown
highlighter : rouge
permalink   : /:categories/:title/

kramdown:
  input          : GFM
  auto_ids       : true
  syntax_highlighter: rouge

# Exclude from build output
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - docs/
  - "*.gemspec"
  - "*.gem"
  - vendor/

# HTML compression (disable in dev for readable source)
compress_html:
  clippings : all
  ignore:
    envs: development
